name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'refactor/**', 'bugfix/**', 'fix/**']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
