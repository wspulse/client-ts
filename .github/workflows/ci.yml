name: CI

on:
  push:
    branches: [main, develop, 'feat/**', 'feature/**', 'refactor/**', 'bugfix/**', 'fix/**', 'chore/**']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Lint
        run: npx eslint src/ test/

      - name: Type check
        run: npx tsc --noEmit
      
      - name: Run unit tests
        run: npx vitest run

  # Integration tests require Go and the wspulse/core + wspulse/server repos
  # as siblings. Runs on push to main/develop and PRs targeting main/develop.
  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'develop'))
    needs: [lint-test]
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Check out client-ts
        uses: actions/checkout@v6
        with:
          path: client-ts

      - name: Check out core
        uses: actions/checkout@v6
        with:
          repository: wspulse/core
          path: core

      - name: Check out server
        uses: actions/checkout@v6
        with:
          repository: wspulse/server
          path: server

      - name: Check out testserver
        uses: actions/checkout@v6
        with:
          repository: wspulse/testserver
          path: testserver

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: testserver/go.sum

      - name: Set up Go workspace
        run: go work init ./testserver ./core ./server

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: client-ts/package-lock.json

      - name: Install dependencies
        working-directory: client-ts
        run: npm ci

      - name: Run integration tests
        working-directory: client-ts
        run: npx vitest run -c vitest.integration.config.ts

  check:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-test]
    steps:
      - name: Verify lint-test passed
        run: |
          if [[ "${{ needs.lint-test.result }}" != "success" ]]; then
            echo "lint-test failed"
            exit 1
          fi

  integration:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-test, test-integration]
    steps:
      - name: Verify test-integration passed
        run: |
          if [[ "${{ needs.lint-test.result }}" != "success" ]]; then
            echo "lint-test failed — test-integration skipped is not valid"
            exit 1
          fi
          if [[ "${{ needs.test-integration.result }}" != "success" && "${{ needs.test-integration.result }}" != "skipped" ]]; then
            echo "test-integration failed"
            exit 1
          fi
