name: CI

on:
  workflow_dispatch:
  push:
    branches:
      [
        main,
        develop,
        "feat/**",
        "feature/**",
        "refactor/**",
        "bugfix/**",
        "fix/**",
        "chore/**",
      ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/instructions/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/instructions/**"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Lint
        run: npx eslint src/ test/

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

  check:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: CHANGELOG gate
        run: |
          CHANGELOG_TOP=$(grep -m1 '## \[' CHANGELOG.md | sed 's/## \[\(.*\)\].*/\1/')
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.base_ref }}" == "main" ]]; then
            if [ "$CHANGELOG_TOP" = "Unreleased" ]; then
              echo "Cannot merge to main with [Unreleased] CHANGELOG — bump the version first"
              exit 1
            fi
          fi
          if [ "$CHANGELOG_TOP" != "Unreleased" ]; then
            PKG_VERSION=$(jq -r '.version' package.json)
            if [ "$PKG_VERSION" != "$CHANGELOG_TOP" ]; then
              echo "Version mismatch: package.json=$PKG_VERSION, CHANGELOG top=$CHANGELOG_TOP"
              exit 1
            fi
            echo "Versions match: $PKG_VERSION"
          fi
          echo "CHANGELOG top: $CHANGELOG_TOP — OK"

      - name: Verify lint-test passed
        run: |
          if [[ "${{ needs.lint-test.result }}" != "success" ]]; then
            echo "lint-test failed"
            exit 1
          fi
