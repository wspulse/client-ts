name: PR to Main Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  changelog-gate:
    uses: wspulse/.github/.github/workflows/changelog-gate.yml@main

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Version consistency check
        run: |
          set -euo pipefail
          # Find the first versioned (non-Unreleased) entry in CHANGELOG.md.
          # [Unreleased] is always at the top; the release version is the next ## [ entry.
          CHANGELOG_VER=$(grep '## \[' CHANGELOG.md | grep -v 'Unreleased' | head -1 | sed 's/## \[\(.*\)\].*/\1/')
          if [ -z "$CHANGELOG_VER" ]; then
            echo "No versioned entry found in CHANGELOG.md — nothing to check"
            exit 0
          fi
          PKG_VERSION=$(jq -r '.version' package.json)
          LOCK_VERSION=$(jq -r '.version' package-lock.json)
          FAIL=0
          if [ "$PKG_VERSION" != "$CHANGELOG_VER" ]; then
            echo "Mismatch: package.json=$PKG_VERSION, CHANGELOG=$CHANGELOG_VER"
            FAIL=1
          fi
          if [ "$LOCK_VERSION" != "$CHANGELOG_VER" ]; then
            echo "Mismatch: package-lock.json=$LOCK_VERSION, CHANGELOG=$CHANGELOG_VER"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "All versions match: $CHANGELOG_VER"
